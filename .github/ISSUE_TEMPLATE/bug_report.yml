name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? Include your `.agentgate.yml` if relevant.
      placeholder: |
        1. Config used: ...
        2. Diff or PR that triggered it: ...
        3. Output / error seen: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentGate version
      placeholder: "e.g. 0.1.0 or @v1"
    validations:
      required: false

  - type: checkboxes
    id: duplicate
    attributes:
      label: Duplicate check
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
