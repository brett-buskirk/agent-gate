name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests for new rules should use the **Rule request** template instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What gap does it fill?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false

  - type: checkboxes
    id: duplicate
    attributes:
      label: Duplicate check
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
