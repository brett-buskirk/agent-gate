name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Typecheck, Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Lint
        run: npm run lint

      - name: Verify action bundle builds
        run: npm run build:action

      - name: Verify demo assets are up to date
        run: |
          npm run build
          npm run demo
          if [ -n "$(git status --porcelain docs/assets)" ]; then
            echo "::error::Demo assets are stale — run 'npm run build && npm run demo' and commit docs/assets."
            git --no-pager diff -- docs/assets
            exit 1
          fi

  agentgate:
    name: AgentGate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: ci
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
